name: Ops / Guard Release Tags

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  reject-manual-release-tags:
    name: Reject Manual Tag Push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Reject manual release tag push
        run: |
          set -euo pipefail
          tag="${GITHUB_REF#refs/tags/}"
          tagged_subject="$(git log -1 --format=%s "${tag}^{commit}")"
          expected_subject="chore(release): cut ${tag}"

          if [ "${tagged_subject}" = "${expected_subject}" ]; then
            echo "Recognized CI-managed release tag ${tag}; skipping guard failure."
            exit 0
          fi

          git fetch --prune --tags
          git tag -d "${tag}" || true
          git push origin ":refs/tags/${tag}"

          echo "Release tags must be created by the 'Release / Cut Release' workflow on main."
          echo "Manual pushes of v* tags are not a supported release path."
          exit 1
